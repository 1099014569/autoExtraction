name: 发布桌面应用

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    name: 构建 Windows 安装包
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: 安装依赖
        run: npm install

      - name: 安装 Playwright Chromium
        run: npx playwright install chromium

      - name: 打包 Windows 安装包
        run: npm run package:desktop:win

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-linux:
    name: 构建 Linux 安装包
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: 安装 Tauri 系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: 安装依赖
        run: npm install

      - name: 安装 Playwright Chromium
        run: npx playwright install chromium

      - name: 打包 Linux 安装包
        run: npm run package:desktop:linux

      - name: 上传 AppImage 产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: 上传 deb 产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

  build-macos:
    name: 构建 macOS 安装包
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: 安装依赖
        run: npm install

      - name: 安装 Playwright Chromium
        run: npx playwright install chromium

      - name: 打包 macOS 安装包
        run: npm run package:desktop:mac

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    name: 发布 GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载所有平台产物
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows-installer/*.exe
            dist/linux-appimage/*.AppImage
            dist/linux-deb/*.deb
            dist/macos-dmg/*.dmg
          generate_release_notes: true
